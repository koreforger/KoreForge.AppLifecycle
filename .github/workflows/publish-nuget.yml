name: Publish NuGet

on:
  push:
    tags:
      - 'KoreForge.AppLifecycle/v*'   # pushed by bin/git-push-nuget.ps1

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # MinVer requires full history to read the version tag

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build KoreForge.AppLifecycle.sln -c Release

      - name: Test
        run: dotnet test KoreForge.AppLifecycle.sln -c Release --no-build

      - name: Pack
        run: dotnet pack src/KF.AppLifecycle/KF.AppLifecycle.csproj -c Release --no-build

      - name: Push to NuGet.org
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
